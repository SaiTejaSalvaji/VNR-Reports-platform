name: Deploy Frontend to Production

on:
  push:
    branches:
      - main
    paths:
      - 'client/**'
      - '.github/workflows/deploy-web-hosting-prod.yml'
  workflow_dispatch:

jobs:
  deploy-frontend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Firebase CLI
        run: npm install -g firebase-tools@latest

      - name: Set up Firebase credentials
        run: |
          echo "${{ secrets.SA_BASE64 }}" | base64 --decode > "${HOME}/firebase-key.json"
          echo "GOOGLE_APPLICATION_CREDENTIALS=${HOME}/firebase-key.json" >> $GITHUB_ENV

      - name: Install dependencies
        working-directory: client
        run: npm install

      - name: Build client code
        working-directory: client
        run: npm run build

      - name: Verify service account details
        run: |
          echo "GOOGLE_APPLICATION_CREDENTIALS=${GOOGLE_APPLICATION_CREDENTIALS}"
          echo "--------------------------------------------"
          cat "$GOOGLE_APPLICATION_CREDENTIALS" | jq '{client_email, project_id, type}'

      - name: Deploy to Firebase Hosting
        working-directory: client
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ env.GOOGLE_APPLICATION_CREDENTIALS }}
        run: |
          firebase deploy --only hosting --project vnrvjiet-monthly-reports --force
